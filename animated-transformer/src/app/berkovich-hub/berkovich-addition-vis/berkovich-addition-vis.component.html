<div class="berkovich-explorer">
  <!-- Header Banner -->
  <header class="explorer-header">
    <div class="header-content">
      <button mat-icon-button routerLink="/berkovich" class="back-btn" aria-label="Go back to hub">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div>
        <h1>Berkovich Addition Explorer</h1>
        <p class="subtitle">
          Visualizing pure addition <markdown [inline]="true" [katex]="true" [data]="'$x + y = x+y$'"></markdown> in Berkovich space (<markdown [inline]="true" [katex]="true" [data]="'$\\mathbb{A}^1(\\mathbb{Q}_p)$'"></markdown>)
        </p>
      </div>
    </div>
    <nav class="header-nav">
      <a routerLink="/berkovich/point" routerLinkActive="active-nav">Point SGD</a>
      <a routerLink="/berkovich/disk" routerLinkActive="active-nav">Disk SGD</a>
      <a routerLink="/berkovich/addition" routerLinkActive="active-nav">Addition</a>
      <a routerLink="/berkovich/addition-gradients" routerLinkActive="active-nav">Addition Gradients</a>
      <a routerLink="/berkovich/glossary" routerLinkActive="active-nav">Glossary</a>
    </nav>
  </header>

  <!-- Explainer Section -->
  <mat-card class="explainer-card collapsible-card">
    <mat-card-header (click)="isExplainerExpanded.set(!isExplainerExpanded())" style="cursor: pointer; width: 100%;">
      <mat-card-title style="width: 100%; display: flex; align-items: center; justify-content: space-between; margin: 0; font-size: 16px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <mat-icon>info</mat-icon>
          <span>Understanding Berkovich Disk Addition</span>
        </div>
        <mat-icon class="collapse-chevron" style="color: #64748b;">{{ isExplainerExpanded() ? 'expand_less' : 'expand_more' }}</mat-icon>
      </mat-card-title>
    </mat-card-header>
    @if (isExplainerExpanded()) {
      <mat-card-content class="explainer-content" style="border-top: 1px solid #f1f5f9; padding-top: 16px; margin-top: 12px;">
        <markdown [katex]="true" [data]="explainerMarkdown"></markdown>
      </mat-card-content>
    }
  </mat-card>

  <div class="dashboard-grid">
    <!-- Left Column: Tree Visualizer -->
    <section class="visualizer-card-container">
      <app-berkovich-multi-tree-vis
        [prime]="prime()"
        [trackedNodes]="trackedNodes()"
      ></app-berkovich-multi-tree-vis>
    </section>

    <!-- Right Column: Config & Digits -->
    <aside class="control-panel">
      <!-- 1. Configuration Card -->
      <app-berkovich-addition-config
        [prime]="prime()"
        [centerAInput]="centerAInput()"
        [rhoAInput]="rhoAInput()"
        [centerBInput]="centerBInput()"
        [rhoBInput]="rhoBInput()"
        (primeChange)="onPrimeChange($event)"
        (centerAInputChange)="centerAInput.set($event)"
        (centerABlur)="onCenterABlur()"
        (rhoAInputChange)="rhoAInput.set($event)"
        (rhoABlur)="onRhoABlur()"
        (centerBInputChange)="centerBInput.set($event)"
        (centerBBlur)="onCenterBBlur()"
        (rhoBInputChange)="rhoBInput.set($event)"
        (rhoBBlur)="onRhoBBlur()"
        (randomize)="onRandomize()"
      />

      <!-- 2. Addition Digits Result -->
      <app-berkovich-addition-digits
        [digitRows]="digitRows()"
      />
    </aside>
  </div>
</div>
