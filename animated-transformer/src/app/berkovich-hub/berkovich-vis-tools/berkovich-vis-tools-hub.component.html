<div class="landing-container">
  <!-- Header Banner -->
  <app-berkovich-header
    title="Berkovich Visualization Sandbox"
    subtitle="Play with individual p-adic and Berkovich space visualizers with customized inputs and configurations."
    [isVisTool]="true"
    backRoute="/berkovich"
  ></app-berkovich-header>

  <main class="landing-main">
    <section class="section-group">
      <div class="cards-grid">
        @for (card of tools; track card.route) {
          <div class="card" [class]="card.colorClass" [routerLink]="card.route">
            <div class="card-glow"></div>
            <div class="card-content">
              <div class="card-icon-container">
                <mat-icon class="card-icon">{{ card.icon }}</mat-icon>
              </div>
              <h3>{{ card.title }}</h3>
              <p>{{ card.description }}</p>
              <div class="card-actions">
                <span class="explore-btn">
                  Open Sandbox
                  <mat-icon>arrow_forward</mat-icon>
                </span>
              </div>
            </div>
          </div>
        }
      </div>
    </section>
  </main>
</div>
