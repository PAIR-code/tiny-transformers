<header class="explorer-header">
  <div class="header-content">
    <button
      mat-icon-button
      [routerLink]="effectiveBackRoute()"
      class="back-btn"
      [attr.aria-label]="isVisTool() ? 'Go back to vis tools hub' : 'Go back to hub'"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div>
      <h1><markdown [inline]="true" [katex]="true" [data]="title()"></markdown></h1>
      @if (subtitle()) {
        <p class="subtitle"><markdown [inline]="true" [katex]="true" [data]="subtitle()"></markdown></p>
      }
    </div>
  </div>

  <nav class="header-nav">
    @if (!isVisTool()) {
      <!-- Main Visualizations Primary Links -->
      <a routerLink="/berkovich/point" routerLinkActive="active-nav">Point SGD</a>
      <a routerLink="/berkovich/disk" routerLinkActive="active-nav">Disk SGD</a>
      <a routerLink="/berkovich/unary-gradients" routerLinkActive="active-nav">Unary Op Gradients</a>
      <a routerLink="/berkovich/operator-gradients" routerLinkActive="active-nav">Binary Op Gradients</a>
      <a routerLink="/berkovich/space-explorers" routerLinkActive="active-nav">Shakespeare Predictor</a>
      <a routerLink="/berkovich/glossary" routerLinkActive="active-nav">Glossary</a>

      <!-- Vis Style Selector Menu -->
      <button
        mat-button
        [matMenuTriggerFor]="visStyleMenu"
        class="vis-style-btn"
        title="Change Visualization Style"
      >
        <mat-icon>{{ visStyle() === 'tree' ? 'account_tree' : 'view_week' }}</mat-icon>
        <span>{{ visStyle() === 'tree' ? 'Tree Vis' : 'Digit Sequence' }}</span>
        <mat-icon class="dropdown-arrow">arrow_drop_down</mat-icon>
      </button>
      <mat-menu #visStyleMenu="matMenu" class="berkovich-nav-menu">
        <div class="menu-header-label">Visualization Style</div>
        <button mat-menu-item (click)="setVisStyle('tree')" [class.active-menu-item]="visStyle() === 'tree'">
          <mat-icon>account_tree</mat-icon>
          <span>Local Berkovich Subtree</span>
        </button>
        <button mat-menu-item (click)="setVisStyle('digits')" [class.active-menu-item]="visStyle() === 'digits'">
          <mat-icon>view_week</mat-icon>
          <span>Digit Sequence Display</span>
        </button>
      </mat-menu>

      <!-- Dots Menu for Vis Tools -->
      <button
        mat-icon-button
        [matMenuTriggerFor]="visToolsMenu"
        class="nav-dots-btn"
        aria-label="Vis Tools menu"
        title="Vis Tools Explorer"
      >
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #visToolsMenu="matMenu" class="berkovich-nav-menu">
        <div class="menu-header-label">Vis Tools Explorer</div>
        <button mat-menu-item routerLink="/vis-tools" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active-menu-item">
          <mat-icon>construction</mat-icon>
          <span>Vis Tools Sandbox Hub</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/digit-display" routerLinkActive="active-menu-item">
          <mat-icon>looks_one</mat-icon>
          <span>Single Digit Display</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/dual-digit-display" routerLinkActive="active-menu-item">
          <mat-icon>looks_two</mat-icon>
          <span>Dual Digit Display</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/tree-vis" routerLinkActive="active-menu-item">
          <mat-icon>account_tree</mat-icon>
          <span>Berkovich Tree Vis</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/operator-tree-vis" routerLinkActive="active-menu-item">
          <mat-icon>call_split</mat-icon>
          <span>Operator Tree Vis</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/model-inspector" routerLinkActive="active-menu-item">
          <mat-icon>grid_on</mat-icon>
          <span>Character Parameters</span>
        </button>
        <button mat-menu-item routerLink="/vis-tools/padic-linear-model-inspector" routerLinkActive="active-menu-item">
          <mat-icon>widgets</mat-icon>
          <span>Linear Model Parameters</span>
        </button>
      </mat-menu>
    } @else {
      <!-- Vis Tools Primary Links -->
      <a routerLink="/vis-tools/digit-display" routerLinkActive="active-nav">Single Digit</a>
      <a routerLink="/vis-tools/dual-digit-display" routerLinkActive="active-nav">Dual Digit</a>
      <a routerLink="/vis-tools/tree-vis" routerLinkActive="active-nav">Tree Vis</a>
      <a routerLink="/vis-tools/operator-tree-vis" routerLinkActive="active-nav">Operator Tree</a>
      <a routerLink="/vis-tools/model-inspector" routerLinkActive="active-nav">Character Params</a>
      <a routerLink="/vis-tools/padic-linear-model-inspector" routerLinkActive="active-nav">Linear Params</a>

      <!-- Dots Menu for Main Visualizations -->
      <button
        mat-icon-button
        [matMenuTriggerFor]="mainVisMenu"
        class="nav-dots-btn"
        aria-label="Main Visualizations menu"
        title="Main Visualizations"
      >
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #mainVisMenu="matMenu" class="berkovich-nav-menu">
        <div class="menu-header-label">Main Visualizations</div>
        <button mat-menu-item routerLink="/berkovich/point" routerLinkActive="active-menu-item">
          <mat-icon>blur_linear</mat-icon>
          <span>Point SGD</span>
        </button>
        <button mat-menu-item routerLink="/berkovich/disk" routerLinkActive="active-menu-item">
          <mat-icon>adjust</mat-icon>
          <span>Disk SGD</span>
        </button>
        <button mat-menu-item routerLink="/berkovich/unary-gradients" routerLinkActive="active-menu-item">
          <mat-icon>looks_one</mat-icon>
          <span>Unary Op Gradients</span>
        </button>
        <button mat-menu-item routerLink="/berkovich/operator-gradients" routerLinkActive="active-menu-item">
          <mat-icon>call_split</mat-icon>
          <span>Binary Op Gradients</span>
        </button>
        <button mat-menu-item routerLink="/berkovich/space-explorers" routerLinkActive="active-menu-item">
          <mat-icon>explore</mat-icon>
          <span>Shakespeare Predictor</span>
        </button>
        <button mat-menu-item routerLink="/berkovich/glossary" routerLinkActive="active-menu-item">
          <mat-icon>menu_book</mat-icon>
          <span>Glossary</span>
        </button>
      </mat-menu>
    }
  </nav>
</header>
