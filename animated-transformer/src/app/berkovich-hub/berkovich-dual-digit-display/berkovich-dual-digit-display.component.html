<svg
  [attr.width]="layout().totalWidth"
  [attr.height]="svgHeight()"
  [style.width.px]="layout().totalWidth"
  [style.height.px]="svgHeight()"
  class="dual-digit-svg"
>
  <defs>
    <!-- Clip path for Row 1 to match the beveled outer border box -->
    <clipPath [attr.id]="clipPathId1">
      <rect
        [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
        [attr.y]="row1Y() - derivedDimensions().boxPadding"
        [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
        [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
        [attr.rx]="derivedDimensions().boxBorderRadius"
        [attr.ry]="derivedDimensions().boxBorderRadius"
      />
    </clipPath>
    <!-- Clip path for Row 2 to match the beveled outer border box -->
    <clipPath [attr.id]="clipPathId2">
      <rect
        [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
        [attr.y]="row2Y() - derivedDimensions().boxPadding"
        [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
        [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
        [attr.rx]="derivedDimensions().boxBorderRadius"
        [attr.ry]="derivedDimensions().boxBorderRadius"
      />
    </clipPath>
  </defs>

  <!-- Row 1 Base Background Box (White) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="row1Y() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.fill]="COLOR_ROW_BG"
    class="row-bg-box"
  />

  <!-- Row 2 Base Background Box (White) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="row2Y() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.fill]="COLOR_ROW_BG"
    class="row-bg-box"
  />

  <!-- Grey background representing xRho (clipped to Row 1) -->
  @if (xRhoBackgroundWidth() > 0) {
    <rect
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
      [attr.y]="row1Y() - derivedDimensions().boxPadding"
      [attr.width]="xRhoBackgroundWidth()"
      [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
      [style.fill]="COLOR_RHO_SHADING"
      [style.opacity]="OPACITY_RHO_SHADING"
      [attr.clip-path]="'url(#' + clipPathId1 + ')'"
      class="x-rho-shading"
    />
  }

  <!-- Grey background representing yRho (clipped to Row 2, if yRho is present) -->
  @if (yRhoBackgroundWidth() > 0) {
    <rect
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
      [attr.y]="row2Y() - derivedDimensions().boxPadding"
      [attr.width]="yRhoBackgroundWidth()"
      [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
      [style.fill]="COLOR_RHO_SHADING"
      [style.opacity]="OPACITY_RHO_SHADING"
      [attr.clip-path]="'url(#' + clipPathId2 + ')'"
      class="y-rho-shading"
    />
  }

  <!-- Squiggly red line under the first (right-most) incorrect digit -->
  @if (firstMismatchColumn(); as col) {
    <path
      [attr.d]="squigglyPathD()"
      stroke="#ef4444"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
      class="mismatch-squiggly-line"
    />
  }

  <!-- Decimal dot between 1 and 1/p (represented in layout by dotX) -->
  @if (layout().dotX !== null) {
    <g
      [style.transform]="'translate(' + layout().dotX + 'px, ' + (row1Y() + derivedDimensions().cellHeight - derivedDimensions().dotYOffsetFromBottom) + 'px)'"
      class="decimal-dot-group"
    >
      <circle
        cx="0"
        cy="0"
        [attr.r]="DOT_RADIUS"
        [style.fill]="COLOR_DOT"
        class="decimal-dot-mark"
      />
    </g>
    <g
      [style.transform]="'translate(' + layout().dotX + 'px, ' + (row2Y() + derivedDimensions().cellHeight - derivedDimensions().dotYOffsetFromBottom) + 'px)'"
      class="decimal-dot-group"
    >
      <circle
        cx="0"
        cy="0"
        [attr.r]="DOT_RADIUS"
        [style.fill]="COLOR_DOT"
        class="decimal-dot-mark"
      />
    </g>
  }

  <!-- Digit boxes for Row 1 (x) -->
  @for (col of layout().cellPositions; track col.power) {
    <g
      [style.transform]="'translate(' + col.center + 'px, ' + (row1Y() + derivedDimensions().cellHeight / 2) + 'px)'"
      class="digit-box-group row1-group"
    >
      <text
        x="0"
        y="0"
        class="digit-text"
        [style.font-size.px]="derivedDimensions().digitFontSize"
      >
        {{ getXDigitAtPower(col.power) }}
      </text>
    </g>
  }

  <!-- Digit boxes for Row 2 (y) -->
  @for (col of layout().cellPositions; track col.power) {
    <g
      [style.transform]="'translate(' + col.center + 'px, ' + (row2Y() + derivedDimensions().cellHeight / 2) + 'px)'"
      class="digit-box-group row2-group"
    >
      <text
        x="0"
        y="0"
        class="digit-text"
        [style.font-size.px]="derivedDimensions().digitFontSize"
      >
        {{ getYDigitAtPower(col.power) }}
      </text>
    </g>
  }

  <!-- Border box around Row 1 (x) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="row1Y() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.stroke]="xOuterBoxColor()"
    class="row-outer-box"
  />

  <!-- Border box around Row 2 (y) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="row2Y() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.stroke]="yOuterBoxColor()"
    class="row-outer-box"
  />

  <!-- Left-aligned rho numbers when position is 'left' -->
  @if (rhoLabelPosition() === 'left') {
    <text
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding - 8"
      [attr.y]="row1Y() + derivedDimensions().cellHeight / 2"
      class="rho-label-text x-rho-label"
      style="text-anchor: end;"
      [style.font-size.px]="derivedDimensions().rhoFontSize"
    >
      {{ xRho().toFixed(2) }}
    </text>
    @if (yRho() !== undefined && yRho() !== null) {
      <text
        [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding - 8"
        [attr.y]="row2Y() + derivedDimensions().cellHeight / 2"
        class="rho-label-text y-rho-label"
        style="text-anchor: end;"
        [style.font-size.px]="derivedDimensions().rhoFontSize"
      >
        {{ yRho()!.toFixed(2) }}
      </text>
    }
  }

  <!-- Guide lines and labels for x rho value -->
  @if (xRhoBoundaryX() !== null && rhoLabelPosition() === 'above-below') {
    <line
      [attr.x1]="derivedDimensions().marginLeft"
      [attr.y1]="row1Y() - derivedDimensions().boxPadding - derivedDimensions().guideLineOffset"
      [attr.x2]="xRhoBoundaryX()"
      [attr.y2]="row1Y() - derivedDimensions().boxPadding - derivedDimensions().guideLineOffset"
      class="rho-guide-line"
    />
    <line
      [attr.x1]="xRhoBoundaryX()"
      [attr.y1]="row1Y() - derivedDimensions().boxPadding - derivedDimensions().guideLineOffset"
      [attr.x2]="xRhoBoundaryX()"
      [attr.y2]="row1Y() - derivedDimensions().boxPadding"
      class="rho-guide-line"
    />
    <text
      [attr.x]="derivedDimensions().marginLeft"
      [attr.y]="row1Y() - derivedDimensions().boxPadding - derivedDimensions().labelOffset"
      class="rho-label-text x-rho-label"
      style="text-anchor: start;"
      [style.font-size.px]="derivedDimensions().rhoFontSize"
    >
      {{ xRho().toFixed(2) }}
    </text>
  }

  <!-- Guide lines and labels for y rho value -->
  @if (yRho() !== undefined && yRho() !== null && yRhoBoundaryX() !== null && rhoLabelPosition() === 'above-below') {
    <line
      [attr.x1]="derivedDimensions().marginLeft"
      [attr.y1]="row2Y() + derivedDimensions().cellHeight + derivedDimensions().boxPadding + derivedDimensions().guideLineOffset"
      [attr.x2]="yRhoBoundaryX()"
      [attr.y2]="row2Y() + derivedDimensions().cellHeight + derivedDimensions().boxPadding + derivedDimensions().guideLineOffset"
      class="rho-guide-line"
    />
    <line
      [attr.x1]="yRhoBoundaryX()"
      [attr.y1]="row2Y() + derivedDimensions().cellHeight + derivedDimensions().boxPadding"
      [attr.x2]="yRhoBoundaryX()"
      [attr.y2]="row2Y() + derivedDimensions().cellHeight + derivedDimensions().boxPadding + derivedDimensions().guideLineOffset"
      class="rho-guide-line"
    />
    <text
      [attr.x]="derivedDimensions().marginLeft"
      [attr.y]="row2Y() + derivedDimensions().cellHeight + derivedDimensions().boxPadding + derivedDimensions().labelOffset"
      class="rho-label-text y-rho-label"
      style="text-anchor: start;"
      [style.font-size.px]="derivedDimensions().rhoFontSize"
    >
      {{ yRho()!.toFixed(2) }}
    </text>
  }
</svg>
