<mat-card class="visualizer-card">
  <mat-card-header class="visualizer-card-header">
    <mat-card-title class="visualizer-title-left">
      <mat-icon>account_tree</mat-icon>
      <span>{{ operator() | titlecase }} Operation</span>
    </mat-card-title>
    <div class="header-operator-select-wrapper" style="display: flex; gap: 16px; align-items: center;">

      <div style="display: flex; align-items: center; gap: 6px;">
        <label for="header-operator-select">Operator:</label>
        <select 
          id="header-operator-select" 
          [ngModel]="operator()" 
          (ngModelChange)="operatorChange.emit($event)"
          class="header-operator-select"
          aria-label="Binary operator selection"
        >
          <option value="addition">Addition</option>
          <option value="multiplication">Multiplication</option>
        </select>
      </div>
    </div>
  </mat-card-header>

  <mat-card-content class="svg-container" style="position: relative;">
    @if (visMode() === 'tree') {
      <svg
        [attr.width]="svgWidth()"
        [attr.height]="svgHeight"
        class="tree-svg"
      >
      <defs>
        <clipPath id="guide-clip">
          <rect x="0" y="0" [attr.width]="svgWidth()" [attr.height]="rhoToY(rhoMin)"></rect>
        </clipPath>
      </defs>

      <!-- Shaded backgrounds for Berkovich Disks of all tracked nodes -->
      @for (tn of trackedNodes(); track tn.id) {
        @if (tn.rho > rhoMin) {
          <rect
            [attr.x]="getRhoLineForTrackedNode(tn).x1"
            [attr.y]="rhoToY(tn.rho)"
            [attr.width]="getRhoLineForTrackedNode(tn).x2 - getRhoLineForTrackedNode(tn).x1"
            [attr.height]="rhoToY(rhoMin) - rhoToY(tn.rho)"
            class="rho-disk-shading"
            [style.fill]="tn.color"
          />
        }
      }
      <!-- Per-tree input labels rendered above each tree root -->
      @for (label of treeInputLabels(); track label.trackedNodeId) {
        @if (label.inputs.length > 0) {
          <foreignObject
            [attr.x]="label.editorX"
            [attr.y]="2"
            [attr.width]="label.width"
            [attr.height]="label.height"
            class="tree-input-fo"
          >
            <div xmlns="http://www.w3.org/1999/xhtml" class="tree-input-label">
              @for (inp of label.inputs; track inp.nodeId) {
                @if (!inp.readonly) {
                  <div class="editor-row">
                    <span class="editor-label" [style.color]="inp.color">{{ inp.labelPrefix }}<sub>c</sub></span>
                    <input
                      class="mini-digit-input"
                      [value]="inp.centerInput"
                      (change)="onInputChange(inp.nodeId, 'center', $any($event.target).value)"
                      (blur)="inputBlur.emit({ nodeId: inp.nodeId, field: 'center' })"
                    />
                  </div>
                  @if (inp.rhoInput !== undefined) {
                    <div class="editor-row">
                      <span class="editor-label" [style.color]="inp.color">{{ inp.labelPrefix }}<sub>ρ</sub></span>
                      <input
                        class="mini-digit-input mini-rho-input"
                        type="text"
                        [value]="inp.rhoInput"
                        (change)="onInputChange(inp.nodeId, 'rho', $any($event.target).value)"
                        (blur)="inputBlur.emit({ nodeId: inp.nodeId, field: 'rho' })"
                      />
                    </div>
                  }
                } @else {
                  <div class="editor-row">
                    <span class="editor-label" [style.color]="inp.color">{{ inp.labelPrefix }}<sub>c</sub></span>
                    <span class="mini-digit-display">{{ inp.centerInput }}</span>
                  </div>
                  @if (inp.rhoInput !== undefined) {
                    <div class="editor-row">
                      <span class="editor-label" [style.color]="inp.color">{{ inp.labelPrefix }}<sub>ρ</sub></span>
                      <span class="mini-digit-display">{{ inp.rhoInput }}</span>
                    </div>
                  }
                }
              }
            </div>
          </foreignObject>
        }
      }

      <!-- Target Y Input Label rendered below the output tree -->
      @if (targetYInputLabel(); as label) {
        <foreignObject
          [attr.x]="label.editorX"
          [attr.y]="label.editorY"
          [attr.width]="label.width"
          [attr.height]="label.height"
          class="tree-input-fo"
        >
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-input-label">
            <div class="editor-row">
              <span class="editor-label" [style.color]="label.input.color">{{ label.input.labelPrefix }}<sub>c</sub></span>
              <input
                class="mini-digit-input"
                [value]="label.input.centerInput"
                (change)="onInputChange(label.input.nodeId, 'center', $any($event.target).value)"
                (blur)="inputBlur.emit({ nodeId: label.input.nodeId, field: 'center' })"
              />
            </div>
          </div>
        </foreignObject>
      }

      <!-- Tree Titles (shown only for non-editable trees) -->
      @for (title of treeTitles(); track title.text) {
        <text
          [attr.x]="title.x"
          [attr.y]="paddingY - 8"
          class="tree-title-text"
          [style.fill]="title.color"
        >
          {{ title.text }}
        </text>
      }

      <!-- Decimal Place Divider Line -->
      <line
        [attr.x1]="0"
        [attr.y1]="rhoToY(0)"
        [attr.x2]="svgWidth()"
        [attr.y2]="rhoToY(0)"
        class="decimal-divider-line"
      />

      <!-- Draw Edges -->
      @for (edge of treeVisuals().edges; track edge.id) {
        <g class="tree-edge-group">
          <path
            [attr.d]="'M ' + edge.x1 + ' ' + edge.y1 + ' L ' + edge.x2 + ' ' + edge.y2"
            [class.inactive-stub]="!edge.isActive"
            [class.overlap-path]="edge.colors.length > 1"
            class="tree-edge"
            [style.stroke]="edge.colors.length === 1 ? edge.colors[0] : (edge.colors.length > 1 ? '#10b981' : '')"
            [style.stroke-width]="edge.isActive ? 3.5 : 1.5"
          />
          <!-- Branch Digit Labels -->
          <g
            class="digit-label-group"
            [style.transform]="'translate(' + (edge.x1 + edge.x2) / 2 + 'px, ' + (edge.y1 + edge.y2) / 2 + 'px)'"
          >
            <circle
              cx="0"
              cy="0"
              r="9"
              [class.inactive-stub]="!edge.isActive"
              class="digit-bg"
            />
            <text
              x="0"
              y="0"
              [class.inactive-stub]="!edge.isActive"
              class="digit-label"
            >
              {{ edge.digitLabel }}
            </text>
          </g>
        </g>
      }

      <!-- Draw Nodes -->
      @for (node of treeVisuals().nodes; track node.id) {
        <g
          class="tree-node-group"
          [style.transform]="'translate(' + node.x + 'px, ' + node.y + 'px)'"
        >
          <circle
            cx="0"
            cy="0"
            [attr.r]="node.logRadius === rhoMin ? 4 : 5"
            [class.leaf-node]="node.logRadius === rhoMin"
            [class.vertex-node]="node.logRadius > rhoMin"
            [class.inactive-stub]="!node.isActive"
            class="tree-node"
          />
        </g>
      }

      <!-- Continuous Log-Radius (Rho) Level Line Indicators -->
      @for (tn of trackedNodes(); track tn.id) {
        @if (tn.id !== 'Y') {
          <g
            class="rho-level-group"
            [style.transform]="'translateY(' + getRhoLineForTrackedNode(tn).y + 'px)'"
          >
            @if (tn.rho > rhoMin) {
              <line
                [attr.x1]="getRhoLineForTrackedNode(tn).x1"
                y1="0"
                [attr.x2]="getRhoLineForTrackedNode(tn).x1"
                [attr.y2]="rhoToY(rhoMin) - rhoToY(tn.rho)"
                class="rho-guide-line"
                [style.stroke]="tn.color"
              />
              <line
                [attr.x1]="getRhoLineForTrackedNode(tn).x2"
                y1="0"
                [attr.x2]="getRhoLineForTrackedNode(tn).x2"
                [attr.y2]="rhoToY(rhoMin) - rhoToY(tn.rho)"
                class="rho-guide-line"
                [style.stroke]="tn.color"
              />
            }
            <line
              [attr.x1]="getRhoLineForTrackedNode(tn).x1"
              y1="0"
              [attr.x2]="getRhoLineForTrackedNode(tn).x2"
              y2="0"
              class="rho-level-line"
              [style.stroke]="tn.color"
            />
            <!-- Left and right end cap ticks -->
            <line
              [attr.x1]="getRhoLineForTrackedNode(tn).x1"
              y1="-4"
              [attr.x2]="getRhoLineForTrackedNode(tn).x1"
              y2="4"
              class="rho-level-cap"
              [style.stroke]="tn.color"
            />
            <line
              [attr.x1]="getRhoLineForTrackedNode(tn).x2"
              y1="-4"
              [attr.x2]="getRhoLineForTrackedNode(tn).x2"
              y2="4"
              class="rho-level-cap"
              [style.stroke]="tn.color"
            />
          </g>
        }
      }
    </svg>
  } @else {
      <!-- Digit Seq Vis Mode Content -->
      <div class="digit-seq-vis-container" style="display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; width: 100%; box-sizing: border-box; min-height: 450px; background: #fafafa; border-radius: 8px;">
        
        <!-- 1. Displays section (Visualizations on top, ordered horizontally: Input x1, Input x2, Computation vs Target) -->
        <div style="display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: center; align-items: flex-start; gap: 24px; width: fit-content; max-width: 100%; margin: 0 auto; background: #ffffff; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;">
          
          <!-- Input x1 update -->
          <div style="flex: 0 0 auto; width: fit-content;">
            <div style="font-weight: 600; font-size: 11.5px; color: #475569; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
              <span style="height: 6px; width: 6px; border-radius: 50%; background: #60a5fa; display: inline-block;"></span>
              <span>x<sub>1</sub></span>
            </div>
            <app-berkovich-digit-display
              [prime]="prime()"
              [center]="centerX1()"
              [rho]="rhoX1()"
              [rhoLabelPosition]="'above'"
              [editableCenter]="true"
              [editableRho]="true"
              (centerChange)="inputChange.emit({ nodeId: 'X1', field: 'center', value: formatDigitSequenceHelper($event) })"
              (rhoChange)="inputChange.emit({ nodeId: 'X1', field: 'rho', value: $event.toString() })"
              [showUpdatedLocation]="true"
              [updatedCenter]="stepDetails().nextX1.center"
              [updatedRho]="stepDetails().nextX1.rho"
              [scale]="digitDisplayScale"
              [outerBoxColor]="'#2563eb'"
              [updatedLineColor]="'#64748b'"
            ></app-berkovich-digit-display>
          </div>

          <!-- Input x2 update -->
          <div style="flex: 0 0 auto; width: fit-content;">
            <div style="font-weight: 600; font-size: 11.5px; color: #475569; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
              <span style="height: 6px; width: 6px; border-radius: 50%; background: #f472b6; display: inline-block;"></span>
              <span>x<sub>2</sub></span>
            </div>
            <app-berkovich-digit-display
              [prime]="prime()"
              [center]="centerX2()"
              [rho]="rhoX2()"
              [rhoLabelPosition]="'above'"
              [editableCenter]="true"
              [editableRho]="true"
              (centerChange)="inputChange.emit({ nodeId: 'X2', field: 'center', value: formatDigitSequenceHelper($event) })"
              (rhoChange)="inputChange.emit({ nodeId: 'X2', field: 'rho', value: $event.toString() })"
              [showUpdatedLocation]="true"
              [updatedCenter]="stepDetails().nextX2.center"
              [updatedRho]="stepDetails().nextX2.rho"
              [scale]="digitDisplayScale"
              [outerBoxColor]="'#db2777'"
              [updatedLineColor]="'#64748b'"
            ></app-berkovich-digit-display>
          </div>

          <!-- Output vs Target -->
          <div style="flex: 0 0 auto; width: fit-content;">
            <div style="font-weight: 600; font-size: 11.5px; color: #475569; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;">
              <span style="height: 6px; width: 6px; border-radius: 50%; background: #64748b; display: inline-block;"></span>
              <span>Computation vs Target ({{ intermediateLabel() }} vs {{ targetLabel() }})</span>
            </div>
            <app-berkovich-dual-digit-display
              [prime]="prime()"
              [xCenter]="stepDetails().outCenter"
              [xRho]="stepDetails().outRho"
              [yCenter]="centerY()"
              [yRho]="-2"
              [rhoLabelPosition]="'above-below'"
              [xEditableCenter]="false"
              [xEditableRho]="false"
              [yEditableCenter]="true"
              [yEditableRho]="false"
              (yCenterChange)="inputChange.emit({ nodeId: 'Y', field: 'center', value: formatDigitSequenceHelper($event) })"
              [scale]="digitDisplayScale"
              [xOuterBoxColor]="'#64748b'"
              [yOuterBoxColor]="'#eab308'"
            ></app-berkovich-dual-digit-display>
          </div>

        </div>

      </div>
    }
  </mat-card-content>

  @if (editableInputs() && showSettings()) {
    <div class="vis-settings-pane">
      <div class="settings-title">Spacing Parameters</div>
      <div class="settings-row">
        <div class="setting-item">
          <label for="base-gap-field">Base Gap:</label>
          <input 
            id="base-gap-field"
            type="number" 
            [value]="baseGap()" 
            (change)="onBaseGapChange($event)"
            class="mini-digit-input spacing-input"
          />
        </div>
        <div class="setting-item">
          <label for="min-gap-field">Min Node Gap:</label>
          <input 
            id="min-gap-field"
            type="number" 
            [value]="minNodeGap()" 
            (change)="onMinNodeGapChange($event)"
            class="mini-digit-input spacing-input"
          />
        </div>
        <div class="setting-item">
          <label for="speed-field">Step Duration (ms):</label>
          <input 
            id="speed-field"
            type="number" 
            [value]="playStepMs()" 
            (change)="onPlayStepMsChange($event)"
            class="mini-digit-input spacing-input"
            step="100"
            min="100"
            max="3000"
          />
        </div>
      </div>
    </div>
  }

  @if (editableInputs()) {
    <div class="visualizer-card-footer">
      <div class="footer-control-left">
        <div class="prime-selector-wrapper">
          <label for="prime-select">p =</label>
          <select 
            id="prime-select" 
            [value]="prime()" 
            (change)="onPrimeChange($event)"
            class="prime-select"
          >
            <option [value]="2">2</option>
            <option [value]="3">3</option>
            <option [value]="5">5</option>
          </select>
        </div>

        <div class="overlay-divider"></div>

        <div class="method-selector-wrapper">
          <label for="method-select">Method =</label>
          <select
            id="method-select"
            class="method-select"
            [ngModel]="vertexMethod()"
            (ngModelChange)="vertexMethodChange.emit($event)"
            aria-label="Vertex resolution method"
          >
            <option value="exact-per-coord">Per-Coord</option>
            <option value="heuristic-joint">Heuristic Joint</option>
            <option value="exact-joint">Exact Joint</option>
          </select>
        </div>
      </div>

      <div class="footer-control-right">
        <div class="learning-rate-wrapper">
          <label for="lr-input">&eta; =</label>
          <input 
            id="lr-input"
            class="mini-digit-input mini-lr-input" 
            [value]="learningRateInput()" 
            (change)="learningRateInputChange.emit(lrInput.value)" 
            (blur)="learningRateBlur.emit()"
            #lrInput 
          />
        </div>

        <div class="overlay-divider"></div>

        <button 
          mat-icon-button 
          [disabled]="!canUndo() || isPlaying()" 
          (click)="undo.emit()" 
          title="Undo last step (Back)"
          class="diagram-action-btn"
        >
          <mat-icon>undo</mat-icon>
        </button>
        <button 
          mat-icon-button 
          [disabled]="isPlaying()" 
          (click)="step.emit()" 
          title="Step forward"
          class="diagram-action-btn"
        >
          <mat-icon>skip_next</mat-icon>
        </button>
        <button 
          mat-icon-button 
          (click)="togglePlay.emit()" 
          title="Animate/Pause"
          class="diagram-action-btn play-btn"
          [class.playing]="isPlaying()"
        >
          <mat-icon>{{ isPlaying() ? 'pause' : 'play_arrow' }}</mat-icon>
        </button>
        <button 
          mat-icon-button 
          (click)="randomize.emit()" 
          title="Randomize center & target"
          class="diagram-action-btn"
        >
          <mat-icon>shuffle</mat-icon>
        </button>
        <button 
          mat-icon-button 
          (click)="toggleSettings()" 
          title="Configure layout parameters"
          class="diagram-action-btn"
          [class.active-settings-btn]="showSettings()"
        >
          <mat-icon>settings</mat-icon>
        </button>
      </div>
    </div>
  }
</mat-card>
