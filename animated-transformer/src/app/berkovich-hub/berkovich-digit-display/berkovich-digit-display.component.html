<svg
  [attr.width]="layout().totalWidth"
  [attr.height]="svgHeight()"
  [style.width.px]="layout().totalWidth"
  [style.height.px]="svgHeight()"
  class="digit-display-svg"
>
  <defs>
    <!-- Clip path for Row to match the beveled outer border box -->
    <clipPath [attr.id]="clipPathId">
      <rect
        [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
        [attr.y]="rowY() - derivedDimensions().boxPadding"
        [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
        [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
        [attr.rx]="derivedDimensions().boxBorderRadius"
        [attr.ry]="derivedDimensions().boxBorderRadius"
      />
    </clipPath>
  </defs>

  <!-- Row Base Background Box (White) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="rowY() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.fill]="COLOR_ROW_BG"
    class="row-bg-box"
  />

  <!-- Grey background representing rho (clipped to Row Clip) -->
  @if (rhoBackgroundWidth() > 0) {
    <rect
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
      [attr.y]="rowY() - derivedDimensions().boxPadding"
      [attr.width]="rhoBackgroundWidth()"
      [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
      [style.fill]="COLOR_RHO_SHADING"
      [style.opacity]="OPACITY_RHO_SHADING"
      [attr.clip-path]="'url(#' + clipPathId + ')'"
      class="rho-shading"
    />
  }

  <!-- Decimal dot between 1 and 1/p (represented in layout by dotX) -->
  @if (layout().dotX !== null) {
    <g
      [style.transform]="'translate(' + layout().dotX + 'px, ' + (rowY() + derivedDimensions().cellHeight - derivedDimensions().dotYOffsetFromBottom) + 'px)'"
      class="decimal-dot-group"
    >
      <circle
        cx="0"
        cy="0"
        [attr.r]="DOT_RADIUS"
        [style.fill]="COLOR_DOT"
        class="decimal-dot-mark"
      />
    </g>
  }

  <!-- Digit boxes for Row -->
  @for (col of layout().cellPositions; track col.power) {
    <g
      [style.transform]="'translate(' + col.center + 'px, ' + (rowY() + derivedDimensions().cellHeight / 2) + 'px)'"
      class="digit-box-group"
    >
      <text
        x="0"
        y="0"
        class="digit-text"
        [style.font-size.px]="derivedDimensions().digitFontSize"
      >
        {{ getDigitAtPower(col.power) }}
      </text>
    </g>
  }

  <!-- Border box around Row - customizable border color -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="rowY() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.stroke]="outerBoxColor()"
    class="row-outer-box"
  />

  <!-- Vertical dotted/dashed line for updated location (gradient update) -->
  @if (updatedRhoBoundaryX() !== null) {
    <line
      [attr.x1]="updatedRhoBoundaryX()"
      [attr.y1]="updatedRhoLineY1()"
      [attr.x2]="updatedRhoBoundaryX()"
      [attr.y2]="updatedRhoLineY2()"
      [style.stroke]="updatedLineColor()"
      [style.stroke-dasharray]="updatedLineStyle() === 'dotted' ? '2 2' : updatedLineStyle() === 'dashed' ? '5 3' : 'none'"
      stroke-width="2"
      class="updated-rho-line"
    />

    <!-- Horizontal solid gradient arrow line connecting current rho to updated rho -->
    @if (showGradientArrow() && rhoBoundaryX() !== null && updatedRhoBoundaryX() !== null && updatedRhoBoundaryX() !== rhoBoundaryX()) {
      <g class="gradient-arrow-group">
        <line
          [attr.x1]="rhoBoundaryX()"
          [attr.y1]="gradientArrowY()"
          [attr.x2]="updatedRhoBoundaryX()"
          [attr.y2]="gradientArrowY()"
          [style.stroke]="updatedLineColor()"
          stroke-width="1.5"
        />
        <polygon
          [attr.points]="getArrowPolygonPoints(gradientArrowY())"
          [style.fill]="updatedLineColor()"
        />
      </g>
    }
  }

  <!-- Guide lines and labels for rho value (left aligned above/below the main digit sequence) -->
  @if (rhoBoundaryX() !== null && (displayPosition() === 'above' || displayPosition() === 'below')) {
    <!-- Horizontal guide line -->
    <line
      [attr.x1]="derivedDimensions().marginLeft"
      [attr.y1]="rhoLineY()"
      [attr.x2]="rhoBoundaryX()"
      [attr.y2]="rhoLineY()"
      class="rho-guide-line"
    />
    <!-- Vertical guide line connecting to border box -->
    <line
      [attr.x1]="rhoBoundaryX()"
      [attr.y1]="rhoLineY()"
      [attr.x2]="rhoBoundaryX()"
      [attr.y2]="rhoVerticalLineStartY()"
      class="rho-guide-line"
    />
    <!-- Left-aligned rho text label -->
    <text
      [attr.x]="derivedDimensions().marginLeft"
      [attr.y]="rhoTextY()"
      class="rho-label-text"
      style="text-anchor: start;"
      [style.font-size.px]="derivedDimensions().rhoFontSize"
    >
      {{ rho().toFixed(2) }}
    </text>
  }

  <!-- Left-aligned rho number when position is 'left' -->
  @if (displayPosition() === 'left') {
    <text
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding - 8"
      [attr.y]="rowY() + derivedDimensions().cellHeight / 2"
      class="rho-label-text centered-rho"
      style="text-anchor: end;"
      [style.font-size.px]="derivedDimensions().rhoFontSize"
    >
      {{ rho().toFixed(2) }}
    </text>
  }
</svg>
