<svg
  [attr.width]="layout().totalWidth"
  [attr.height]="svgHeight()"
  class="digit-display-svg"
>
  <defs>
    <!-- Clip path for Row to match the beveled outer border box -->
    <clipPath [attr.id]="clipPathId">
      <rect
        [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
        [attr.y]="rowY() - derivedDimensions().boxPadding"
        [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
        [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
        [attr.rx]="derivedDimensions().boxBorderRadius"
        [attr.ry]="derivedDimensions().boxBorderRadius"
      />
    </clipPath>
  </defs>

  <!-- Row Base Background Box (White) -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="rowY() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.fill]="COLOR_ROW_BG"
    class="row-bg-box"
  />

  <!-- Grey background representing rho (clipped to Row Clip) -->
  @if (rhoBackgroundWidth() > 0) {
    <rect
      [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
      [attr.y]="rowY() - derivedDimensions().boxPadding"
      [attr.width]="rhoBackgroundWidth()"
      [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
      [style.fill]="COLOR_RHO_SHADING"
      [style.opacity]="OPACITY_RHO_SHADING"
      [attr.clip-path]="'url(#' + clipPathId + ')'"
      class="rho-shading"
    />
  }

  <!-- Decimal dot between 1 and 1/p (represented in layout by dotX) -->
  @if (layout().dotX !== null) {
    <circle
      [attr.cx]="layout().dotX"
      [attr.cy]="rowY() + derivedDimensions().cellHeight - derivedDimensions().dotYOffsetFromBottom"
      [attr.r]="DOT_RADIUS"
      [style.fill]="COLOR_DOT"
      class="decimal-dot-mark"
    />
  }

  <!-- Digit boxes for Row -->
  @for (col of layout().cellPositions; track col.power) {
    <g class="digit-box-group">
      <text
        [attr.x]="col.center"
        [attr.y]="rowY() + derivedDimensions().cellHeight / 2"
        class="digit-text"
        [style.font-size.px]="derivedDimensions().fontSize"
      >
        {{ getDigitAtPower(col.power) }}
      </text>
    </g>
  }

  <!-- Border box around Row - customizable border color -->
  <rect
    [attr.x]="derivedDimensions().marginLeft - derivedDimensions().boxPadding"
    [attr.y]="rowY() - derivedDimensions().boxPadding"
    [attr.width]="layout().rowWidth + 2 * derivedDimensions().boxPadding"
    [attr.height]="derivedDimensions().cellHeight + 2 * derivedDimensions().boxPadding"
    [attr.rx]="derivedDimensions().boxBorderRadius"
    [attr.ry]="derivedDimensions().boxBorderRadius"
    [style.stroke]="outerBoxColor()"
    class="row-outer-box"
  />

  <!-- Dotted guide lines & labels for rho value (centered above the main digit sequence) -->
  @if (displayShowRho() && rhoBoundaryX() !== null) {
    <!-- Vertical line connecting boundary to rhoLineY level -->
    <line
      [attr.x1]="rhoBoundaryX()"
      [attr.y1]="rowY() - derivedDimensions().boxPadding"
      [attr.x2]="rhoBoundaryX()"
      [attr.y2]="rhoLineY()"
      class="rho-dotted-line"
    />
    <!-- Horizontal line connecting boundary to center X under text -->
    <line
      [attr.x1]="rhoBoundaryX()"
      [attr.y1]="rhoLineY()"
      [attr.x2]="layout().centerX"
      [attr.y2]="rhoLineY()"
      class="rho-dotted-line"
    />
    <!-- Dotted underline helper directly under text -->
    <line
      [attr.x1]="layout().centerX - 22"
      [attr.y1]="rhoLineY()"
      [attr.x2]="layout().centerX + 22"
      [attr.y2]="rhoLineY()"
      class="rho-dotted-line"
      style="stroke-width: 1.5px;"
    />
    <!-- Centered text above the digits -->
    <text
      [attr.x]="layout().centerX"
      [attr.y]="rhoTextY()"
      class="rho-label-text centered-rho"
      [style.fill]="outerBoxColor()"
      [style.font-size.px]="derivedDimensions().fontSize - 1"
    >
      &rho; = {{ rho().toFixed(2) }}
    </text>
  }
</svg>
