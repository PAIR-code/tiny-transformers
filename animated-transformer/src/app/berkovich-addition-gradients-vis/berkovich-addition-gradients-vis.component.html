<div class="berkovich-explorer">
  <!-- Header Banner -->
  <header class="explorer-header">
    <div class="header-content">
      <button mat-icon-button routerLink="/berkovich" class="back-btn" aria-label="Go back to hub">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div>
        <h1>Berkovich Addition & Gradients Explorer</h1>
        <p class="subtitle">
          Visualizing the backward pass and continuous gradient flow through an addition node.
        </p>
      </div>
    </div>
  </header>

  <div class="dashboard-grid">
    <!-- Left Column: Tree Visualizer -->
    <section class="visualizer-card-container">
      <app-berkovich-multi-tree-vis
        [prime]="prime()"
        [trackedNodes]="trackedNodes()"
      ></app-berkovich-multi-tree-vis>
    </section>

    <!-- Right Column: Config & Calculus -->
    <aside class="control-panel">
      <app-berkovich-addition-gradients-config
        [prime]="prime()"
        [centerYInput]="centerYInput()"
        [centerAInput]="centerAInput()"
        [rhoAInput]="rhoAInput()"
        [centerBInput]="centerBInput()"
        [rhoBInput]="rhoBInput()"
        (primeChange)="onPrimeChange($event)"
        (centerYInputChange)="centerYInput.set($event)"
        (centerYBlur)="onCenterYBlur()"
        (centerAInputChange)="centerAInput.set($event)"
        (centerABlur)="onCenterABlur()"
        (rhoAInputChange)="rhoAInput.set($event)"
        (rhoABlur)="onRhoABlur()"
        (centerBInputChange)="centerBInput.set($event)"
        (centerBBlur)="onCenterBBlur()"
        (rhoBInputChange)="rhoBInput.set($event)"
        (rhoBBlur)="onRhoBBlur()"
        (step)="onStep()"
        (randomize)="onRandomize()"
      />

      <app-berkovich-addition-calculus
        [rhoA]="rhoA()"
        [rhoB]="rhoB()"
        [dL_drhoC]="dL_drhoC()"
      />
    </aside>
  </div>
</div>
